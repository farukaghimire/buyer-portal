<!DOCTYPE html>
<html>
<head>
    <title>Buyer Portal - Register</title>
    <style>
        /* --- Body & Typography --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        h1 {
            color: #1f2937;
            margin-bottom: 5px;
            text-align: center;
        }

        h2 {
            color: #4b5563;
            margin-bottom: 20px;
            text-align: center;
            font-weight: normal;
        }

        form {
            background-color: #fff;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            width: 350px;
            max-width: 90%;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 5px rgba(59, 130, 246, 0.5);
            outline: none;
        }

        button {
            background-color: #3b82f6;
            color: #fff;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }

        p {
            text-align: center;
            margin-top: 15px;
        }

        a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s;
        }

        a:hover {
            color: #2563eb;
        }

        @media (max-width: 400px) {
            form {
                padding: 20px;
                width: 90%;
            }
            input, button {
                font-size: 0.95rem;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div>
        <h1>Buyer Portal</h1>
        <h2>Register</h2>
        <form method="POST">
            <input type="text" name="name" placeholder="Name" required />
            <input type="email" name="email" placeholder="Email" required />
            <input type="password" name="password" placeholder="Password" required />
            <button type="submit">Register</button>
        </form>
        <p>Already have an account? <a href="/login">Login</a></p>
    </div>
</body>
</html>
